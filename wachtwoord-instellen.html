<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E8720C">
  <meta name="description" content="Wegwijzer — Wachtwoord instellen">
  <title>Wegwijzer — Wachtwoord instellen</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-container">

    <!-- Header -->
    <header class="app-header">
      <span class="logo-emoji" aria-hidden="true">🗺️</span>
      <h1>Wegwijzer</h1>
    </header>

    <!-- Content -->
    <main class="page-content">

      <!-- Formulier -->
      <div id="form-view" class="card">
        <h2 class="card-title">Wachtwoord instellen</h2>
        <p class="card-subtitle">Kies een sterk wachtwoord (minimaal 8 tekens)</p>

        <div id="alert" class="alert" role="alert">
          <span id="alert-message"></span>
        </div>

        <form id="set-password-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="new-password">Nieuw wachtwoord</label>
            <input
              class="form-input"
              type="password"
              id="new-password"
              name="new-password"
              placeholder="Minimaal 8 tekens"
              autocomplete="new-password"
              required
              minlength="8"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Wachtwoord bevestigen</label>
            <input
              class="form-input"
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Herhaal je wachtwoord"
              autocomplete="new-password"
              required
              minlength="8"
            >
          </div>

          <button type="submit" class="btn btn-primary" id="set-password-btn">
            Wachtwoord instellen
          </button>
        </form>
      </div>

      <!-- Succes -->
      <div id="success-view" class="card hidden">
        <h2 class="card-title">Gelukt!</h2>
        <p class="card-subtitle">
          Je wachtwoord is ingesteld. Je wordt doorgestuurd naar de inlogpagina...
        </p>
        <div class="text-center mt-16">
          <a href="index.html" class="btn btn-primary" style="text-decoration:none">
            Naar inloggen
          </a>
        </div>
      </div>

    </main>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/base-path.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/wachtwoord-instellen.js"></script>
</body>
</html>
